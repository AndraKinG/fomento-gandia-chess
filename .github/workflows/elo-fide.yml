name: Actualizar ELO FIDE

on:
  schedule:
    # Día 3 de cada mes a las 06:00 UTC (tras la publicación de la lista FIDE)
    - cron: "0 6 3 * *"
  workflow_dispatch: {}

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Actualizar ELO FIDE en Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/actualizar-elo-fide.mjs
